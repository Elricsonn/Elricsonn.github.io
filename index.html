<!DOCTYPE html>
  <html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elricsonn — Portail</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
                  background-color: #000000;
            background-image: radial-gradient(ellipse at center, #1a1a1a 0%, #000000 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      color: #c9a84c;
      }

    .ornament {
            font-size: 1.2rem;
      letter-spacing: 0.8em;
      color: #8a6a2a;
      margin-bottom: 1.5rem;
}

    h1 {
            font-family: 'Cinzel Decorative', serif;
      font-size: 2rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #c9a84c;
            text-shadow: 0 0 20px rgba(201,168,76,0.3);
      margin-bottom: 0.6rem;
      text-align: center;
}

    .subtitle {
            font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #8a6a2a;
      margin-bottom: 3rem;
      font-variant: small-caps;
}

    .separator {
            width: 200px;
      height: 1px;
      background: linear-gradient(to right, transparent, #8a6a2a, transparent);
      margin: 0 auto 3rem;
}

    .portail {
            background: rgba(30, 20, 8, 0.85);
      border: 1px solid #5a3e1b;
      padding: 2.5rem 3rem;
      width: 380px;
      max-width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .portail-title {
            font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #8a6a2a;
      text-align: center;
      margin-bottom: 0.5rem;
      font-variant: small-caps;
}

    .btn {
            display: block;
      width: 100%;
      padding: 0.85rem 1rem;
      background: transparent;
      border: 1px solid #5a3e1b;
      color: #c9a84c;
            font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
}

    .btn:hover {
            background: rgba(201,168,76,0.1);
      border-color: #c9a84c;
        }

    .btn.disabled {
      opacity: 0.35;
      cursor: default;
      pointer-events: none;
      }

    .footer-ornament {
            margin-top: 3rem;
      font-size: 1rem;
      color: #5a3e1b;
}

    .soon {
            font-size: 0.55rem;
      color: #5a3e1b;
      letter-spacing: 0.15em;
      text-align: center;
      margin-top: -0.5rem;
}
  </style>
    </head>
    <body>

      <div class="ornament">✦ ✦ ✦</div>

      <h1>Elricsonn</h1>
      <p class="subtitle">Portail Principal</p>
      <div class="separator"></div>

      <div class="portail">
        <p class="portail-title">— Accès aux espaces —</p>
        <a href="https://elricsonn.github.io/loge-rer" class="btn">✦ Loge RER — Rite Écossais Rectifié</a>
                        <a href="https://elricsonn.github.io/tableemeraude" class="btn">✦ La Table d'Émeraude</a>
        <a href="https://elricsonn.github.io/lamargottiere" class="btn">✦ La Margottière</a>
      </div>

      <div class="footer-ornament">✦</div>

    </body>
    </html>
